<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Anthony! 🌮</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
    }

    /* ====== TACO RAIN ====== */
    .taco {
      position: fixed;
      top: -80px;
      font-size: 2.5rem;
      animation: fall linear infinite;
      user-select: none;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ====== CARD ====== */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 2rem;
      padding: 3rem 3.5rem;
      text-align: center;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5);
      animation: popIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275) both;
      max-width: 520px;
    }

    @keyframes popIn {
      0%   { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .taco-icon {
      font-size: 5rem;
      animation: bounce 1.2s ease-in-out infinite alternate;
      display: block;
      margin-bottom: 0.5rem;
    }

    @keyframes bounce {
      from { transform: translateY(0) rotate(-10deg); }
      to   { transform: translateY(-18px) rotate(10deg); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 6vw, 3.2rem);
      background: linear-gradient(90deg, #f9a825, #ff6f00, #e91e63, #9c27b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .subtitle {
      color: rgba(255,255,255,0.75);
      font-size: 1.1rem;
      margin: 0.8rem 0 1.5rem;
    }

    .cake-row {
      font-size: 2.2rem;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
    }

    .message {
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 360px;
      margin: 0 auto;
    }

    /* Confetti dots */
    .confetti-bg {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0.6;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0.6; }
      100% { transform: translateY(-10vh)  scale(1.2); opacity: 0; }
    }

    /* Sparkle button */
    .btn {
      display: inline-block;
      margin-top: 1.8rem;
      padding: 0.7rem 2rem;
      background: linear-gradient(135deg, #f9a825, #e91e63);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(233,30,99,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 28px rgba(233,30,99,0.6);
    }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <!-- Confetti layer -->
  <div class="confetti-bg" id="confetti"></div>

  <!-- Main card -->
  <div class="card">
    <span class="taco-icon">🌮</span>
    <h1>Happy Birthday<br>Anthony!</h1>
    <p class="subtitle">It's taco 'bout a special day! 🎉</p>
    <div class="cake-row">🎂🕯️🎈🎊🎁</div>
    <p class="message">
      Wishing you a day as delicious as tacos,
      as bright as confetti, and as unforgettable
      as you are. I LOVE YOU! 🥳
    </p>
    <button class="btn" onclick="shower()">🌮 More Tacos! 🌮</button>
  </div>

  <script>
    // ── Taco Rain ──
    const TACOS = ['🌮','🌯','🫔'];

    function spawnTaco() {
      const el = document.createElement('div');
      el.className = 'taco';
      el.textContent = TACOS[Math.floor(Math.random() * TACOS.length)];
      el.style.left = Math.random() * 100 + 'vw';
      const dur = (Math.random() * 4 + 3).toFixed(2);
      const delay = (Math.random() * 5).toFixed(2);
      el.style.animationDuration = dur + 's';
      el.style.animationDelay   = delay + 's';
      el.style.fontSize = (Math.random() * 1.5 + 1.5).toFixed(1) + 'rem';
      document.body.appendChild(el);
      // Remove after animation
      setTimeout(() => el.remove(), (parseFloat(dur) + parseFloat(delay) + 0.5) * 1000);
    }

    // Initial rain burst
    for (let i = 0; i < 35; i++) spawnTaco();
    // Continuous drizzle
    setInterval(spawnTaco, 300);

    // Button shower
    function shower() {
      for (let i = 0; i < 20; i++) {
        setTimeout(spawnTaco, i * 60);
      }
    }

    // ── Confetti dots ──
    const colors = ['#f9a825','#e91e63','#9c27b0','#00bcd4','#4caf50','#ff5722'];
    const confettiEl = document.getElementById('confetti');
    for (let i = 0; i < 30; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      const size = Math.random() * 10 + 5;
      d.style.cssText = `
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        left:${Math.random()*100}vw;
        animation-duration:${(Math.random()*6+5).toFixed(1)}s;
        animation-delay:${(Math.random()*5).toFixed(1)}s;
      `;
      confettiEl.appendChild(d);
    }
  </script>
</body>
</html>
